# Allow-list of Monitored Chats for the daily Digest.
#
# Only chat_id is needed — the human-readable title is read from the Message
# Store (chats.title in the scraper's PostgreSQL). The title comments below are
# just for humans reading this file.
#
# The Message Store is shared with a general-purpose scraper, so this explicit
# allow-list is what keeps unrelated chats out of the markirovka Digest.

[settings]
min_message_length = 30    # skip messages shorter than this (noise: "+1", "ок")

